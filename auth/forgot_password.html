<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Apex Authentication - Forgot Password</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/css/globals.css" />
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script src="../assets/js/theme.js"></script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden antialiased font-body-base text-body-base">
<!-- Subtle Violet Glow Background -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Main Card Container -->
<main class="w-full max-w-[400px] mx-4 relative z-10">
<!-- Top Left Back Action (Positioned slightly outside or at the top of the card) -->
<a class="inline-flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors mb-6 group w-fit" href="#">
<span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform duration-200">arrow_back</span>
<span class="font-body-sm text-body-sm">Back to login</span>
</a>
<!-- The Card -->
<div class="bg-surface-container-high border border-outline-variant rounded-xl p-8 shadow-sm flex flex-col gap-8">
<!-- Header Section -->
<header class="flex flex-col gap-2">
<h1 class="font-h1 text-h1 text-on-surface">Forgot Password</h1>
<p class="font-body-base text-body-base text-on-surface-variant">
                    Enter your work email and we'll send a reset link
                </p>
</header>
<!-- Form Section -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Input Group -->
<div class="flex flex-col gap-2">
<label class="font-body-sm text-body-sm text-on-surface-variant sr-only" for="work-email">Work Email</label>
<input class="w-full bg-surface-container-lowest border border-outline rounded-lg px-4 py-3 font-body-base text-body-base text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow duration-200" id="work-email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary text-on-primary font-body-base text-body-base font-semibold rounded-lg px-4 py-3 hover:bg-primary-fixed-dim transition-colors duration-200 flex items-center justify-center shadow-sm" type="submit">
                    Send reset link
                </button>
</form>
</div>
</main>
</body></html>
