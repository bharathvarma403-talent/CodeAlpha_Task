<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Apex Authentication - Reset Password</title>
<!-- Google Fonts & Material Symbols -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script src="../assets/js/theme.js"></script>
<link rel="stylesheet" href="../assets/css/globals.css" />
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-body-base antialiased">
<!-- Subtle Violet Glow Background Effect -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary-container/10 blur-[120px] rounded-full pointer-events-none z-0"></div>
<!-- Centered Card Container -->
<main class="w-full max-w-[400px] bg-surface-container-high border border-outline-variant rounded-xl p-container-padding shadow-2xl relative z-10 flex flex-col gap-6">
<!-- Header Section -->
<div class="flex flex-col items-center gap-2 text-center">
<div class="w-12 h-12 bg-surface-container border border-outline-variant rounded-lg flex items-center justify-center mb-2 shadow-sm">
<span class="material-symbols-outlined text-primary text-[24px]">lock_reset</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface">Reset Password</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Please enter your new password to secure your Apex workspace.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-5">
<!-- New Password Input -->
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="new-password">New Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2.5 font-body-base text-body-base text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors pr-10" id="new-password" placeholder="Enter new password" type="password" value="Apex!Project2024"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Password Requirements & Strength (Glassmorphism inspired container) -->
<div class="flex flex-col gap-4 bg-surface-container-lowest/50 border border-outline-variant/60 rounded-lg p-4 backdrop-blur-sm">
<!-- Strength Indicator -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Password Strength</span>
<span class="font-body-sm text-body-sm text-tertiary font-medium">Strong</span>
</div>
<div class="flex w-full gap-1 h-1.5">
<div class="flex-1 rounded-full bg-tertiary"></div>
<div class="flex-1 rounded-full bg-tertiary"></div>
<div class="flex-1 rounded-full bg-tertiary"></div>
<div class="flex-1 rounded-full bg-surface-container-highest"></div>
</div>
</div>
<!-- Requirements Checklist -->
<ul class="flex flex-col gap-2">
<li class="flex items-center gap-2 font-body-sm text-body-sm text-on-surface">
<span class="material-symbols-outlined text-[16px] text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        8+ characters
                    </li>
<li class="flex items-center gap-2 font-body-sm text-body-sm text-on-surface">
<span class="material-symbols-outlined text-[16px] text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Uppercase letter
                    </li>
<li class="flex items-center gap-2 font-body-sm text-body-sm text-on-surface">
<span class="material-symbols-outlined text-[16px] text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Number
                    </li>
<li class="flex items-center gap-2 font-body-sm text-body-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[16px] text-outline-variant">radio_button_unchecked</span>
                        Special character
                    </li>
</ul>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="confirm-password">Confirm Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2.5 font-body-base text-body-base text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors pr-10" id="confirm-password" placeholder="Re-enter new password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="mt-2 w-full bg-primary text-on-primary font-body-base text-body-base font-semibold py-2.5 px-4 rounded-lg hover:bg-primary-fixed transition-colors shadow-sm flex items-center justify-center gap-2 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background focus:ring-primary" type="submit">
                Reset password
            </button>
</form>
<!-- Footer Link -->
<div class="text-center pt-2 border-t border-outline-variant/30">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors inline-flex items-center gap-1.5" href="#">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Return to log in
            </a>
</div>
</main>
</body></html>
