<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Apex Authentication - Two-Factor</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script src="../assets/js/theme.js"></script>

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface antialiased min-h-screen flex items-center justify-center relative overflow-hidden font-body-base">
<!-- Ambient Violet Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Main Authentication Card -->
<main class="relative z-10 w-full max-w-[400px] bg-surface-container border border-outline-variant rounded-xl shadow-2xl p-8 flex flex-col gap-8">
<!-- Header -->
<header class="flex flex-col items-center gap-4 text-center">
<div class="w-12 h-12 bg-surface-variant rounded-full flex items-center justify-center border border-outline-variant/50 shadow-sm">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">
                    lock
                </span>
</div>
<div class="flex flex-col gap-2">
<h1 class="text-h1 font-h1 text-on-surface">Enter verification code</h1>
<p class="text-body-base font-body-base text-on-surface-variant">We've sent a 6-digit verification code to your device. Please enter it below.</p>
</div>
</header>
<!-- Form Area -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- OTP Input Group -->
<div class="flex flex-col gap-3">
<div class="flex justify-between gap-2 w-full">
<input aria-label="Digit 1" class="w-12 h-14 text-center text-h2 font-h2 bg-surface-container-highest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" type="text" value="5"/>
<input aria-label="Digit 2" class="w-12 h-14 text-center text-h2 font-h2 bg-surface-container-highest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" type="text" value="0"/>
<input aria-label="Digit 3" autofocus="" class="w-12 h-14 text-center text-h2 font-h2 bg-surface-container-highest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" type="text" value=""/>
<input aria-label="Digit 4" class="w-12 h-14 text-center text-h2 font-h2 bg-surface-container-highest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" type="text" value=""/>
<input aria-label="Digit 5" class="w-12 h-14 text-center text-h2 font-h2 bg-surface-container-highest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" type="text" value=""/>
<input aria-label="Digit 6" class="w-12 h-14 text-center text-h2 font-h2 bg-surface-container-highest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" type="text" value=""/>
</div>
<!-- Resend & Timer -->
<div class="flex justify-between items-center px-1">
<span class="text-body-sm font-body-sm text-on-surface-variant">Didn't receive a code?</span>
<div class="flex items-center gap-1.5">
<span class="text-mono font-mono text-on-surface-variant">0:24</span>
<a class="text-body-sm font-body-sm text-primary opacity-50 cursor-not-allowed pointer-events-none hover:underline decoration-primary/50 underline-offset-2" href="#">Resend code</a>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-3 pt-2">
<button class="w-full h-11 bg-primary text-on-primary rounded-lg text-body-base font-body-base font-medium shadow-[inset_0_1px_0_rgba(255,255,255,0.2)] hover:bg-primary-fixed transition-colors flex items-center justify-center" type="submit">
                    Verify
                </button>
<button class="w-full h-10 bg-transparent text-on-surface-variant rounded-lg text-body-sm font-body-sm hover:bg-surface-variant/50 transition-colors flex items-center justify-center" type="button">
                    Use backup code instead
                </button>
</div>
</form>
</main>
</body></html>
