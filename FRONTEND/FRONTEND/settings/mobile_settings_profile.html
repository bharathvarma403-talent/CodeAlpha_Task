<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="../assets/js/theme.js"></script>
<link rel="stylesheet" href="../assets/css/globals.css" />
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-base min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Header -->
<header class="flex items-center justify-between px-4 h-14 w-full border-b border-surface-container-high sticky top-0 bg-background/90 backdrop-blur-md z-10">
<button class="flex items-center gap-1 text-primary hover:text-primary-fixed transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary rounded-DEFAULT p-1">
<span aria-hidden="true" class="material-symbols-outlined text-[20px]">arrow_back</span>
<span class="font-body-base text-body-base">Settings</span>
</button>
<h1 class="font-h2 text-h2 absolute left-1/2 -translate-x-1/2 text-on-surface">Profile</h1>
<div class="w-20"></div>
</header>
<!-- Profile Header -->
<section class="flex flex-col items-center pt-8 pb-6 px-container-padding">
<div class="relative w-24 h-24 mb-4">
<div class="w-full h-full rounded-full bg-surface-container-high border border-outline-variant overflow-hidden shadow-sm flex items-center justify-center">
<img alt="Profile Avatar" class="w-full h-full object-cover" data-alt="A professional, high-contrast headshot of a woman in a minimalist corporate environment. The image is styled for dark mode, featuring deep shadows and crisp, cool lighting that highlights her features. The aesthetic is clean, dense, and performance-focused, devoid of unnecessary clutter." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDFLvhsvNYoTovFA1XomLJGMJKvXiA56IHbDnUbKLEY1fZN6ACWuiu-FulKJB3ofA7Knqw_YmkTBfyu2jCr4fpv2ilStShBcOTy7NxtwSVCutqA9ry8VVaZbFphIGZ8v_i5AX6NgmakV3SsZCvNAVCf_uY7aZnc_EpoUZqEgQKxS-_JHwS309mmM0kNWA2VovCRALj1c8F3t6-Ij9Th47u-P-3aFM8D8-iCo9o2_iEwSCH7jFst6UjkJ6hV41ZjOnx2Vy-o0yltsB8"/>
</div>
<button aria-label="Change profile picture" class="absolute bottom-0 right-0 bg-surface-container-highest border border-outline-variant rounded-full p-1.5 shadow-md hover:bg-surface-bright transition-colors focus:outline-none focus:ring-2 focus:ring-primary text-on-surface">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<h2 class="font-h2 text-h2 text-on-surface">Alex Carter</h2>
</section>
<!-- Main Form Section -->
<main class="flex-1 px-container-padding flex flex-col gap-6 pb-12 w-full max-w-2xl mx-auto">
<!-- Field Stack -->
<div class="flex flex-col gap-container-padding">
<!-- Full Name -->
<div class="flex flex-col gap-list-item-gap">
<label class="font-body-sm text-body-sm text-on-surface-variant ml-1" for="fullName">Full Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-base text-body-base text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline shadow-sm" id="fullName" type="text" value="Alex Carter"/>
</div>
<!-- Display Name -->
<div class="flex flex-col gap-list-item-gap">
<label class="font-body-sm text-body-sm text-on-surface-variant ml-1" for="displayName">Display Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-base text-body-base text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline shadow-sm" id="displayName" type="text" value="alex_c"/>
</div>
<!-- Email (Verified) -->
<div class="flex flex-col gap-list-item-gap">
<label class="font-body-sm text-body-sm text-on-surface-variant ml-1" for="emailAddress">Email</label>
<div class="relative flex items-center">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-4 pr-12 py-3 font-body-base text-body-base text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="emailAddress" type="email" value="alex.carter@apex.inc"/>
<div class="absolute right-3 flex items-center justify-center text-primary" title="Verified Account">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<!-- Bio -->
<div class="flex flex-col gap-list-item-gap">
<label class="font-body-sm text-body-sm text-on-surface-variant ml-1" for="userBio">Bio</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-base text-body-base text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none shadow-sm" id="userBio" maxlength="140" rows="3">Lead engineer focusing on systems architecture and high-velocity shipping.</textarea>
<div class="flex justify-end pr-1 pt-1">
<span class="font-mono text-mono text-on-surface-variant">74 / 140</span>
</div>
</div>
</div>
<!-- Timezone Component -->
<button class="flex items-center justify-between w-full bg-surface-container border border-outline-variant rounded-lg px-4 py-4 mt-2 hover:bg-surface-container-high transition-colors focus:outline-none focus:ring-2 focus:ring-primary shadow-sm group">
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Timezone</span>
<div class="flex items-center gap-2">
<span class="font-body-base text-body-base text-on-surface">Pacific Time (PT)</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-on-surface transition-colors">chevron_right</span>
</div>
</button>
<!-- Action Area -->
<div class="mt-8 flex flex-col gap-6">
<!-- Primary Action (Disabled State) -->
<button class="w-full bg-inverse-primary text-on-primary-fixed-variant font-h2 text-body-base py-3.5 rounded-lg opacity-40 cursor-not-allowed shadow-sm border border-transparent flex items-center justify-center transition-all" disabled="">
                Save Changes
            </button>
<!-- Danger Zone -->
<div class="flex justify-center pt-4">
<button class="text-error font-body-base text-body-base hover:text-error-container hover:underline underline-offset-4 transition-colors focus:outline-none rounded-DEFAULT px-2 py-1">
                    Delete Account
                </button>
</div>
</div>
</main>
</body></html>
