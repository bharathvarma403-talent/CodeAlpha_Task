<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Apex — Signing you in…</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/supabase.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center font-body-base antialiased">

<!-- Background glow -->
<div class="absolute inset-0 z-0 pointer-events-none">
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary-container rounded-full blur-[150px] opacity-10"></div>
</div>

<div class="z-10 flex flex-col items-center gap-6 text-center px-6">
  <!-- Logo -->
  <div class="w-14 h-14 bg-surface-container flex items-center justify-center rounded-xl border border-outline-variant shadow-sm">
    <span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">hexagon</span>
  </div>

  <!-- Spinner -->
  <div class="relative w-12 h-12">
    <svg class="animate-spin w-12 h-12 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  </div>

  <div class="space-y-1">
    <h1 id="status-title" class="font-h1 text-h1 text-on-surface">Completing sign-in…</h1>
    <p id="status-msg" class="font-body-sm text-body-sm text-on-surface-variant">Please wait while we verify your Google account.</p>
  </div>

  <!-- Error state (hidden by default) -->
  <div id="error-box" class="hidden mt-2 bg-error/10 border border-error/30 text-error rounded-lg px-5 py-4 text-sm max-w-sm w-full text-left">
    <div class="flex items-start gap-2">
      <span class="material-symbols-outlined text-[18px] mt-0.5 flex-shrink-0">error</span>
      <p id="error-msg">Authentication failed. Please try again.</p>
    </div>
    <a href="sign_in.html" class="mt-3 inline-flex items-center gap-1 text-error font-medium hover:underline text-sm">
      <span class="material-symbols-outlined text-[16px]">arrow_back</span>
      Back to Sign In
    </a>
  </div>
</div>

<script>
document.addEventListener('supabase:ready', async () => {
  const db = window._supabase;

  // Supabase exchanges the OAuth token from the URL hash/query automatically.
  // We just need to listen for the session to be set.
  const { data, error } = await db.auth.getSession();

  if (error) {
    showError(error.message);
    return;
  }

  if (data.session) {
    // Already have a session — go to dashboard
    window.location.replace('../dashboard/index.html');
    return;
  }

  // Listen for auth state change (token exchange happens async)
  db.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      window.location.replace('../dashboard/index.html');
    } else if (event === 'SIGNED_OUT' || (!session && event !== 'INITIAL_SESSION')) {
      showError('Authentication failed or was cancelled. Please try again.');
    }
  });

  // Safety timeout — if nothing happens in 10s, show error
  setTimeout(() => {
    const errBox = document.getElementById('error-box');
    if (errBox.classList.contains('hidden')) {
      showError('Sign-in is taking longer than expected. Please try again.');
    }
  }, 10000);

  function showError(msg) {
    document.getElementById('status-title').textContent = 'Sign-in failed';
    document.getElementById('status-msg').classList.add('hidden');
    document.querySelector('.relative.w-12').classList.add('hidden');
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-box').classList.remove('hidden');
  }
});
</script>
</body>
</html>
